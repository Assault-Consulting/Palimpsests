name: Feature request
description: Suggest a capability or change.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: Palimpsests core is a **library + CLI, not an
        application**, and it **does not modify the attention kernel**. See
        [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) and the README scope
        section — requests that cross those lines will be redirected, not
        rejected out of hand, but it saves everyone time to know up front.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: >
        What would you add or change? If it touches level 3, say which
        capability (batching, shared-prefix, tool loop, persistence).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing tools or workarounds, and why they fall short.
    validations:
      required: false
