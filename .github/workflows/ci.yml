name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: CI only needs to read the repo. Declaring this
# at the top level (and granting nothing more per-job) is what the OpenSSF
# Scorecard Token-Permissions check looks for.
permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      # Lint WITHOUT an editable install of the package. This is the fix
      # for a subtle isort divergence: when `palimpsests` is pip-installed
      # (via -e .), ruff's isort sees it as an installed third-party
      # package and regroups first-party imports differently than it does
      # from the src-layout heuristic alone — which passed locally but
      # failed in CI. Linting a plain checkout keeps `palimpsests`
      # first-party by the src heuristic, deterministically.
      - name: Install ruff only
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.20

      - name: Lint (ruff)
        run: |
          ruff --version
          ruff check --output-format=full .

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (base + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test (pytest)
        run: pytest -q

  coverage:
    name: coverage (statement >= 80%)
    runs-on: ubuntu-latest
    # Measured on one target, not the full OS x version matrix: statement
    # coverage does not vary by platform, and this is a gate, not a
    # portability check. The one deliberately-uncovered module is the
    # hardware-only ctypes backend (see pyproject [tool.coverage.report]);
    # overall coverage clears 80% with it counted.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install (base + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Coverage (pytest --cov, fail under 80%)
        run: pytest --cov=palimpsests --cov-report=term-missing --cov-fail-under=80
