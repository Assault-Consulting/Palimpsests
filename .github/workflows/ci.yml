name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lint WITHOUT an editable install of the package. This is the fix
      # for a subtle isort divergence: when `palimpsests` is pip-installed
      # (via -e .), ruff's isort sees it as an installed third-party
      # package and regroups first-party imports differently than it does
      # from the src-layout heuristic alone — which passed locally but
      # failed in CI. Linting a plain checkout keeps `palimpsests`
      # first-party by the src heuristic, deterministically.
      - name: Install ruff only
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.20

      - name: Lint (ruff)
        run: |
          ruff --version
          ruff check --output-format=full .

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (base + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test (pytest)
        run: pytest -q
