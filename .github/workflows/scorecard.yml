# OpenSSF Scorecard — automated security-health checks.
#
# Runs the Scorecard analysis on push to the default branch and weekly,
# publishes the result so the README badge auto-updates, and uploads a
# SARIF report to GitHub's code-scanning dashboard.
#
# Constraints imposed by the Scorecard publish API (do not "tidy" these
# away — they are required for publish_results to be accepted):
#   - no workflow-level `env:` or `defaults:` blocks;
#   - no workflow-level write permissions;
#   - ONLY the job running ossf/scorecard-action may hold id-token: write;
#   - must run on an Ubuntu hosted runner.
#
# The badge this enables (add to README once the first run completes):
#   [![OpenSSF Scorecard](https://api.scorecard.dev/projects/github.com/Assault-Consulting/Palimpsests/badge)](https://scorecard.dev/viewer/?uri=github.com/Assault-Consulting/Palimpsests)
name: scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, so the score keeps refreshing even without pushes.
    - cron: "27 6 * * 1"
  push:
    branches:
      - main

# No workflow-level permissions block: permissions are granted per-job
# only, as the publish API requires.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed to publish the results and enable the auto-updating badge
      # (OIDC token). Scoped to THIS job only, per the publish API rules.
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish so the weekly public scan is replaced by our own run
          # and the README badge reflects the latest state.
          publish_results: true

      # Keep the raw SARIF as an artifact for inspection.
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      # Surface findings in the Security tab (Code Scanning Alerts).
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
