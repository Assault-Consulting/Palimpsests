# OpenSSF Scorecard — automated security-health checks (for us, not for show).
#
# Runs the Scorecard analysis on push to the default branch and weekly,
# publishes the result so the score is queryable and the README badge can
# auto-update, and uploads a SARIF report to GitHub's code-scanning tab.
#
# WHY THE PINS BELOW ARE EXACT: the Scorecard publish API only accepts a
# fixed, approved list of actions in this job, and rejects the run (or the
# tag fails to resolve) otherwise. The previous version of this file used
# `ossf/scorecard-action@v2` — which is NOT a real tag — and unreleased
# `@v7` action tags, so the job failed at "Set up job" before analysis.
# These versions are taken from a known-good, current example (Microsoft
# hve-core, Jan 2026) and the approved list is:
#   actions/checkout, actions/upload-artifact,
#   github/codeql-action/upload-sarif, ossf/scorecard-action,
#   step-security/harden-runner
#
# Publish-API workflow rules (do not "tidy" away):
#   - no workflow-level `env:` or `defaults:` blocks;
#   - no workflow-level WRITE permissions (top-level is read-only below);
#   - only the job running ossf/scorecard-action may hold id-token: write;
#   - must run on an Ubuntu hosted runner.
#
# Badge (add to README once the first run publishes successfully):
#   [![OpenSSF Scorecard](https://api.scorecard.dev/projects/github.com/Assault-Consulting/Palimpsests/badge)](https://scorecard.dev/viewer/?uri=github.com/Assault-Consulting/Palimpsests)
name: scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, so the score keeps refreshing even without pushes.
    - cron: "27 6 * * 1"
  push:
    branches:
      - main

# Top-level permissions are read-only, as the publish API requires. Write
# scopes are granted per-job below, only to the analysis job.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # OIDC token, so publish_results can prove the run's authenticity and
      # the badge can auto-update. Scoped to THIS job only.
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish so the score is queryable via the public API and the
          # README badge reflects the latest state. Requires id-token: write.
          publish_results: true

      # Keep the raw SARIF as an artifact for inspection (5-day retention).
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      # Surface findings in the Security tab (Code Scanning Alerts).
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d  # v3
        with:
          sarif_file: results.sarif
