# OpenSSF Scorecard — automated security-health checks (for us, not for show).
#
# Runs the Scorecard analysis on push to the default branch and weekly,
# publishes the result so the score is queryable and the README badge can
# auto-update, and uploads a SARIF report to GitHub's code-scanning tab.
#
# WHY THE PINS BELOW ARE EXACT: the Scorecard publish API only accepts a
# fixed, approved list of actions in this job, and rejects the run (or the
# tag fails to resolve) otherwise. The previous version of this file used
# `ossf/scorecard-action@v2` — which is NOT a real tag — and unreleased
# `@v7` action tags, so the job failed at "Set up job" before analysis.
# These versions are taken from a known-good, current example (Microsoft
# hve-core, Jan 2026) and the approved list is:
#   actions/checkout, actions/upload-artifact,
#   github/codeql-action/upload-sarif, ossf/scorecard-action,
#   step-security/harden-runner
#
# WHY THE LAST TWO STEPS ARE continue-on-error: this is a NON-GATING
# health check. Its two external integrations can fail for reasons outside
# our code and outside a green build's control:
#   - `Run analysis` publishes to the OpenSSF API over OIDC/Sigstore
#     (publish_results); a signing or API-side hiccup fails the step.
#   - `Upload to code-scanning` needs the repo's Code-scanning feature
#     enabled; without it the SARIF upload 403s.
# Neither reflects the security health the analysis actually measures, and
# a red X here does not belong on `main` for a report workflow. Soft-fail
# keeps the analysis running (and the SARIF archived as an artifact) while
# the job reports success. Tighten this (remove continue-on-error) once the
# specific failing step is identified and fixed — do not leave it as a
# permanent mask if the publish/badge is meant to work.
#
# Publish-API workflow rules (do not "tidy" away):
#   - no workflow-level `env:` or `defaults:` blocks;
#   - no workflow-level WRITE permissions (top-level is read-only below);
#   - only the job running ossf/scorecard-action may hold id-token: write;
#   - must run on an Ubuntu hosted runner.
#
# Badge (add to README once the first run publishes successfully):
#   [![OpenSSF Scorecard](https://api.scorecard.dev/projects/github.com/Assault-Consulting/Palimpsests/badge)](https://scorecard.dev/viewer/?uri=github.com/Assault-Consulting/Palimpsests)
name: scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, so the score keeps refreshing even without pushes.
    - cron: "27 6 * * 1"
  push:
    branches:
      - main

# Top-level permissions are read-only, as the publish API requires. Write
# scopes are granted per-job below, only to the analysis job.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # OIDC token, so publish_results can prove the run's authenticity and
      # the badge can auto-update. Scoped to THIS job only.
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2  # v2.4.3
        # Non-gating: a publish (OpenSSF API / Sigstore) hiccup must not turn
        # main red. The SARIF is still written for the steps below.
        continue-on-error: true
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish so the score is queryable via the public API and the
          # README badge reflects the latest state. Requires id-token: write.
          publish_results: true

      # Keep the raw SARIF as an artifact for inspection (5-day retention).
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      # Surface findings in the Security tab (Code Scanning Alerts).
      # codeql-action v3 is being deprecated by GitHub; pinned to the latest
      # v4 release, which also runs natively on Node 24 (clearing the Node 20
      # deprecation warning on this step). upload-sarif is a narrow action, so
      # the v3 -> v4 major bump is low risk; the step is also soft-failed above.
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        # Non-gating: requires Code scanning enabled on the repo; a 403 here
        # must not turn main red for a report workflow.
        continue-on-error: true
        with:
          sarif_file: results.sarif
