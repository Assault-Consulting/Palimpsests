name: release

# Publish to PyPI on a version tag. Build, publish, and release are split
# so the OIDC-scoped publish job has the narrowest possible permissions,
# and so the built artifacts are visible even if publishing is skipped.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token is stored
# in the repo. The trusted publisher must be configured once on PyPI for
# project "palimpsests", workflow "release.yml", environment "pypi"
# (a pending publisher works before the first release, so the first tag
# creates the project). Until that is configured, the publish step fails
# harmlessly; the build job still runs.
#
# The build job also generates a CycloneDX SBOM into its own directory
# (NOT dist/ — see the SBOM step). The release job publishes a GitHub
# Release carrying the wheel, sdist, and SBOM as downloadable assets
# (which also makes the CHANGELOG's per-version release links resolve).

on:
  push:
    tags:
      - "v*"

# Least-privilege default for the whole workflow. Each job below additively
# grants only the scope it needs (publish: id-token; release: contents) —
# the pattern the OpenSSF Scorecard Token-Permissions check rewards.
permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Generate SBOM (CycloneDX)
        # The SBOM is written to sbom/, deliberately NOT dist/. dist/ is what
        # the publish job uploads to PyPI, and gh-action-pypi-publish validates
        # every file in it — a .cdx.json there fails as "Unknown distribution
        # format" and blocks the whole upload. Keeping the SBOM in its own
        # directory (and its own artifact) keeps the PyPI upload to wheel +
        # sdist only, while the release job still attaches it.
        #
        # Built from a *clean* throwaway venv holding only the freshly built
        # wheel and its runtime closure, so build tooling never enters the SBOM.
        # --output-reproducible drops timestamps; cyclonedx-bom is pinned.
        run: |
          python -m pip install --upgrade "cyclonedx-bom==7.3.0"
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/python -m pip install --upgrade pip
          /tmp/sbom-venv/bin/python -m pip install dist/*.whl
          mkdir -p sbom
          cyclonedx-py environment /tmp/sbom-venv \
            --mc-type library \
            --pyproject pyproject.toml \
            --output-reproducible \
            --spec-version 1.6 \
            --output-format JSON \
            --output-file sbom/palimpsests.cdx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment gates the release and scopes the OIDC token. Create
    # an environment named "pypi" in the repo settings; optionally add a
    # required reviewer there for a manual approval gate on every publish.
    environment:
      name: pypi
      url: https://pypi.org/p/palimpsests
    permissions:
      # id-token: write is what lets PyPI verify this workflow via OIDC.
      # Granted only to this job — the rest of the workflow stays read-only.
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Scoped to this job only: create the GitHub Release for the tag and
      # upload the distribution files plus the SBOM as assets. The rest of
      # the workflow stays contents: read.
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom
          path: sbom/

      - name: Create or update GitHub Release with SBOM asset
        # Idempotent: if a release for this tag already exists (for example,
        # one created from the Releases UI while tagging), upload/replace the
        # assets on it instead of failing; otherwise create it. Uses the
        # runner's gh CLI — no third-party action added. --verify-tag ties the
        # release to the pushed git tag; --generate-notes builds notes from
        # merged PRs (only on first creation).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/*.whl \
              dist/*.tar.gz \
              sbom/palimpsests.cdx.json \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/*.whl \
              dist/*.tar.gz \
              sbom/palimpsests.cdx.json \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
