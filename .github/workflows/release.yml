name: release

# Publish to PyPI on a version tag. Build and publish are split so the
# OIDC-scoped publish job has the narrowest possible permissions, and so
# the built artifacts are visible even if publishing is skipped.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token is stored
# in the repo. The trusted publisher must be configured once on PyPI for
# project "palimpsests", workflow "release.yml", environment "pypi"
# (a pending publisher works before the first release, so the first tag
# creates the project). Until that is configured, the publish step fails
# harmlessly; the build job still runs.

on:
  push:
    tags:
      - "v*"

# Least-privilege default for the whole workflow. The publish job below
# additively grants only id-token: write (for OIDC), scoped to itself —
# the pattern the OpenSSF Scorecard Token-Permissions check rewards.
permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment gates the release and scopes the OIDC token. Create
    # an environment named "pypi" in the repo settings; optionally add a
    # required reviewer there for a manual approval gate on every publish.
    environment:
      name: pypi
      url: https://pypi.org/p/palimpsests
    permissions:
      # id-token: write is what lets PyPI verify this workflow via OIDC.
      # Granted only to this job — the rest of the workflow stays read-only.
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
