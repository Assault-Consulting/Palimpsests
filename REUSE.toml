# REUSE configuration — https://reuse.software (REUSE.toml, spec 3.3)
#
# Declares copyright and licensing for every file in the repository in one
# place, so `reuse lint` passes without a per-file SPDX header in each
# source file. This is the machine-readable, tool-verifiable statement that
# every file has an explicit, known license — the signal OpenSSF Scorecard
# and grant reviewers (IP provenance) look for.
#
# Everything in the project is Apache-2.0, copyright Assault Consulting.
# The globs below cover the whole tree; add a more specific block above the
# catch-all only if a vendored file with a different license is ever added.
#
# The license text itself lives at LICENSES/Apache-2.0.txt (the location
# REUSE expects). The root LICENSE file is kept as the conventional,
# human-facing copy.

version = 1

[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Assault Consulting"
SPDX-License-Identifier = "Apache-2.0"
